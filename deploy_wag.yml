---
# PrivX Web Access Gateway (WAG) Deployment Playbook
# This playbook handles PrivX Carrier and Web Proxy installation and configuration

# =============================================================================
# WAG DEPLOYMENT PHASE
# =============================================================================

- name: PrivX WAG Deployment
  hosts: privxcarrier:privxwebproxy
  gather_facts: true
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  roles:
    - deploy_wag
