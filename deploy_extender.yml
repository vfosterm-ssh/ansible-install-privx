---
# PrivX Extender Deployment Playbook
# This playbook handles PrivX Extender installation and configuration

# =============================================================================
# EXTENDER DEPLOYMENT PHASE
# =============================================================================

- name: PrivX Extender Deployment
  hosts: privxextender
  gather_facts: true
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  roles:
    - deploy_extender
