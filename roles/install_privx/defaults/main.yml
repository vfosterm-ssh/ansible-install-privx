---
# PrivX Installation Role - Default Variables

# Ansible connection settings
REMOTE_USER: "{{ REMOTE_USER | default('root') }}"
BECOME: "{{ BECOME | default('no') }}"

# PrivX version settings
# If privx_version is defined, install specific version (e.g., "42.2")
# If not defined, install latest available version
privx_package_name: "{{ 'PrivX-' + privx_version if privx_version is defined else 'PrivX' }}"
