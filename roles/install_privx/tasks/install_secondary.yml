---
# PrivX Secondary Node Installation Tasks
# Note: Global installation check is done in main.yml, so these tasks only run if PrivX is not installed

- name: Install PrivX on secondary node
  ansible.builtin.dnf:
    name: "{{ privx_package_name }}"
    state: present
  register: privx_install_result
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Display installation result for secondary node
  ansible.builtin.debug:
    msg: "PrivX successfully installed on {{ inventory_hostname }} (Secondary){{ ' - Version: ' + privx_version if privx_version is defined else '' }}"
  when: privx_install_result.changed
