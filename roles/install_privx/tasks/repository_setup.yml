---
- name: Detect OS distribution and version
  ansible.builtin.setup:
    filter: ansible_distribution*
  when: ansible_facts['distribution'] is not defined

- name: Display detected OS information
  ansible.builtin.debug:
    msg: "Detected OS on {{ inventory_hostname }}: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}"

- name: Validate SSH product repository overrides
  ansible.builtin.assert:
    that:
      - not (custom_ssh_product_repo_url | length > 0 and custom_ssh_product_repo_file | length > 0)
    fail_msg: >
      Define only one of custom_ssh_product_repo_url or custom_ssh_product_repo_file.
      Both were provided.

# Red Hat/Rocky Linux 9 setup
- name: Setup repositories for Red Hat/Rocky Linux 9
  when:
    - ansible_facts['distribution'] in ['RedHat', 'Rocky']
    - ansible_facts['distribution_major_version'] == '9'
  block:
    - name: Set SSH product repository URL for RHEL/Rocky 9
      ansible.builtin.set_fact:
        ssh_product_repo_url: "{{ custom_ssh_product_repo_url | default('', true) if custom_ssh_product_repo_url | length > 0 else 'https://product-repository.ssh.com/rhel9/ssh-products.repo' }}"

    - name: Install EPEL repository for RHEL/Rocky 9
      ansible.builtin.dnf:
        name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
        state: present
        disable_gpg_check: true
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when: manage_epel_repo | bool

    - name: Install PostgreSQL server for RHEL/Rocky 9
      ansible.builtin.dnf:
        name: postgresql-server
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"

    - name: Install firewalld for RHEL/Rocky 9
      ansible.builtin.dnf:
        name: firewalld
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"

    - name: Display SSH product repository management status for RHEL/Rocky 9
      ansible.builtin.debug:
        msg: >-
          SSH product repository tasks {{ 'enabled' if (manage_ssh_product_repo | bool) else 'skipped' }}
          on {{ inventory_hostname }}.

    - name: Import SSH.COM GPG key for RHEL/Rocky 9
      ansible.builtin.rpm_key:
        key: "{{ ssh_product_repo_gpg_key_url }}"
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when: manage_ssh_product_repo | bool

    - name: Add SSH.COM repository from local file for RHEL/Rocky 9
      ansible.builtin.copy:
        src: "{{ custom_ssh_product_repo_file }}"
        dest: /etc/yum.repos.d/ssh-products.repo
        mode: '0644'
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when:
        - manage_ssh_product_repo | bool
        - custom_ssh_product_repo_file | length > 0

    - name: Add SSH.COM repository from URL for RHEL/Rocky 9
      ansible.builtin.get_url:
        url: "{{ ssh_product_repo_url }}"
        dest: /etc/yum.repos.d/ssh-products.repo
        mode: '0644'
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when:
        - manage_ssh_product_repo | bool
        - custom_ssh_product_repo_file | length == 0


# Red Hat/Rocky Linux 8 setup
- name: Setup repositories for Red Hat/Rocky Linux 8
  when:
    - ansible_facts['distribution'] in ['RedHat', 'Rocky']
    - ansible_facts['distribution_major_version'] == '8'
  block:
    - name: Set SSH product repository URL for RHEL/Rocky 8
      ansible.builtin.set_fact:
        ssh_product_repo_url: "{{ custom_ssh_product_repo_url | default('', true) if custom_ssh_product_repo_url | length > 0 else 'https://product-repository.ssh.com/rhel8/ssh-products.repo' }}"

    - name: Install EPEL repository for RHEL/Rocky 8
      ansible.builtin.dnf:
        name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm
        state: present
        disable_gpg_check: true
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when: manage_epel_repo | bool

    - name: Install epel-release for RHEL/Rocky 8
      ansible.builtin.dnf:
        name: epel-release
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when: manage_epel_repo | bool

    - name: Install firewalld for RHEL/Rocky 8
      ansible.builtin.dnf:
        name: firewalld
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"

    - name: Enable PostgreSQL 16 module for RHEL/Rocky 8
      ansible.builtin.command:
        cmd: dnf module enable postgresql:16 -y
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      changed_when: true
      when: manage_postgresql_module | bool

    - name: Install PostgreSQL server for RHEL/Rocky 8
      ansible.builtin.dnf:
        name: postgresql-server
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"

    - name: Display SSH product repository management status for RHEL/Rocky 8
      ansible.builtin.debug:
        msg: >-
          SSH product repository tasks {{ 'enabled' if (manage_ssh_product_repo | bool) else 'skipped' }}
          on {{ inventory_hostname }}.

    - name: Import SSH.COM GPG key for RHEL/Rocky 8
      ansible.builtin.rpm_key:
        key: "{{ ssh_product_repo_gpg_key_url }}"
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when: manage_ssh_product_repo | bool

    - name: Add SSH.COM repository from local file for RHEL/Rocky 8
      ansible.builtin.copy:
        src: "{{ custom_ssh_product_repo_file }}"
        dest: /etc/yum.repos.d/ssh-products.repo
        mode: '0644'
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when:
        - manage_ssh_product_repo | bool
        - custom_ssh_product_repo_file | length > 0

    - name: Add SSH.COM repository from URL for RHEL/Rocky 8
      ansible.builtin.get_url:
        url: "{{ ssh_product_repo_url }}"
        dest: /etc/yum.repos.d/ssh-products.repo
        mode: '0644'
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when:
        - manage_ssh_product_repo | bool
        - custom_ssh_product_repo_file | length == 0


# Amazon Linux 2023 setup
- name: Setup repositories for Amazon Linux 2023
  when:
    - ansible_facts['distribution'] == 'Amazon'
    - ansible_facts['distribution_major_version'] == '2023'
  block:
    - name: Set SSH product repository URL for Amazon Linux 2023
      ansible.builtin.set_fact:
        ssh_product_repo_url: "{{ custom_ssh_product_repo_url | default('', true) if custom_ssh_product_repo_url | length > 0 else 'https://product-repository.ssh.com/rhel8/ssh-products.repo' }}"

    - name: Install PostgreSQL 15 server for Amazon Linux 2023
      ansible.builtin.dnf:
        name: postgresql15-server
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"

    - name: Install libxcrypt-compat for Amazon Linux 2023
      ansible.builtin.dnf:
        name: libxcrypt-compat
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"

    - name: Install firewalld for Amazon Linux 2023
      ansible.builtin.dnf:
        name: firewalld
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"

    - name: Display SSH product repository management status for Amazon Linux 2023
      ansible.builtin.debug:
        msg: >-
          SSH product repository tasks {{ 'enabled' if (manage_ssh_product_repo | bool) else 'skipped' }}
          on {{ inventory_hostname }}.

    - name: Import SSH.COM GPG key for Amazon Linux 2023
      ansible.builtin.rpm_key:
        key: "{{ ssh_product_repo_gpg_key_url }}"
        state: present
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when: manage_ssh_product_repo | bool

    - name: Add SSH.COM repository from local file for Amazon Linux 2023
      ansible.builtin.copy:
        src: "{{ custom_ssh_product_repo_file }}"
        dest: /etc/yum.repos.d/ssh-products.repo
        mode: '0644'
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when:
        - manage_ssh_product_repo | bool
        - custom_ssh_product_repo_file | length > 0

    - name: Add SSH.COM repository from URL for Amazon Linux 2023
      ansible.builtin.get_url:
        url: "{{ ssh_product_repo_url }}"
        dest: /etc/yum.repos.d/ssh-products.repo
        mode: '0644'
      remote_user: "{{ REMOTE_USER | default('root') }}"
      become: "{{ BECOME | default('no') }}"
      when:
        - manage_ssh_product_repo | bool
        - custom_ssh_product_repo_file | length == 0


- name: Verify repository setup completed
  ansible.builtin.debug:
    msg: "Repository setup completed on {{ inventory_hostname }}: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}"
