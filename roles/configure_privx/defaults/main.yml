---
# PrivX Configuration Role - Default Variables

# Auto-calculate load balancer setting based on presence of additional nodes
privx_lb: "{{ 1 if (groups['privx_additional_nodes'] | default([]) | length) > 0 else 0 }}"

# Default configuration values (can be overridden in inventory)
privx_ips: " "
privx_superuser: admin
email_domain: example.com
database_name: privx
database_username: privx
database_port: 5432
database_sslmode: require
database_additional_params: >-
  {{'sslrootcert=/opt/privx/etc/privx-db-trust-anchor.pem'
      if database_sslmode in ['verify-ca', 'verify-full']
     else ''}}

# Ansible connection settings
ansible_user: "{{ ansible_user | default('rocky') }}"
