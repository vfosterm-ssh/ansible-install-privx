---
- name: Check if PrivX is installed
  ansible.builtin.command:
    cmd: rpm -q PrivX
  register: privx_installed
  failed_when: false
  changed_when: false

- name: Verify PrivX installation
  ansible.builtin.assert:
    that:
      - privx_installed.rc == 0
    fail_msg: |
      PrivX is not installed on this node.
      Please run the installation playbook first:
        ansible-playbook -i inventory install_privx.yml
    success_msg: "PrivX installation verified: {{ privx_installed.stdout }}"

- name: Check database connectivity
  ansible.builtin.command:
    cmd: pg_isready -h {{ postgres_address }} -p {{ database_port }}
  register: db_connectivity
  failed_when: false
  changed_when: false

- name: Verify database connectivity
  ansible.builtin.assert:
    that:
      - db_connectivity.rc == 0
    fail_msg: |
      Cannot connect to PostgreSQL database at {{ postgres_address }}:{{ database_port }}
      Please verify:
        • Database server is running
        • Network connectivity is available
        • Firewall allows connections on port {{ database_port }}
    success_msg: "Database connectivity verified"
