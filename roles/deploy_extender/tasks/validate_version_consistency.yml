---
# Validate PrivX Extender version consistency

- name: Check if PrivX is installed on primary node
  ansible.builtin.command:
    cmd: rpm -q --qf '%{VERSION}-%{RELEASE}\n' PrivX
  register: primary_privx_version
  failed_when: false
  changed_when: false
  delegate_to: "{{ groups['privx_primary'][0] }}"
  run_once: true

- name: Check if any PrivX Extender is already installed
  ansible.builtin.shell:
    cmd: rpm -q --qf '%{VERSION}-%{RELEASE}\n' PrivX-Extender || rpm -q --qf '%{VERSION}-%{RELEASE}\n' PrivX-Extender-FIPS
  register: existing_extender_check
  failed_when: false
  changed_when: false
  delegate_to: "{{ groups['privxextender'][0] if groups['privxextender'] is defined and groups['privxextender'] | length > 0 else groups['privx_primary'][0] }}"
  run_once: true

- name: Extract installed versions
  ansible.builtin.set_fact:
    installed_privx_evr: "{{ primary_privx_version.stdout | trim if primary_privx_version.rc == 0 else '' }}"
    installed_privx_version: "{{ (primary_privx_version.stdout | trim).split('-')[0] if primary_privx_version.rc == 0 else '' }}"
    installed_extender_evr: "{{ existing_extender_check.stdout | trim if existing_extender_check.rc == 0 and existing_extender_check.stdout else '' }}"
    installed_extender_version: "{{ (existing_extender_check.stdout | trim).split('-')[0] if existing_extender_check.rc == 0 and existing_extender_check.stdout else '' }}"
    requested_privx_is_exact: "{{ privx_version is defined and '-' in privx_version }}"
  run_once: true

- name: Display extender version consistency check
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "                      EXTENDER VERSION CONSISTENCY CHECK                       "
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "• PrivX Core Version: {{ installed_privx_evr if installed_privx_evr else 'Not found' }}"
      - "• Installed Extender Version: {{ installed_extender_evr if installed_extender_evr else 'None installed' }}"
      - "• Requested Version: {{ privx_version if privx_version is defined else 'Latest' }}"
      - ""
  run_once: true

- name: Fail if PrivX core not found
  ansible.builtin.fail:
    msg:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "                             PRIVX CORE NOT FOUND                              "
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "❌ PrivX core installation not found!"
      - ""
      - "PrivX Extenders require a PrivX core installation to be present."
      - "Please install PrivX core first using:"
      - ""
      - "ansible-playbook -i inventory deploy_privx.yml --tags full_deployment"
      - ""
      - "════════════════════════════════════════════════════════════════════════════════"
  when: primary_privx_version.rc != 0
  run_once: true

- name: Fail if version mismatch with PrivX core
  ansible.builtin.fail:
    msg:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "                           VERSION MISMATCH ERROR                              "
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "❌ Extender version mismatch with PrivX core!"
      - ""
      - "• PrivX Core Version: {{ installed_privx_evr }}"
      - "• Requested Extender Version: {{ privx_version }}"
      - ""
      - "Extender version must match PrivX core version. Please use:"
      - ""
      - "ansible-playbook -i inventory deploy_extender.yml -e privx_version={{ installed_privx_version }}"
      - ""
      - "════════════════════════════════════════════════════════════════════════════════"
  when:
    - primary_privx_version.rc == 0
    - privx_version is defined
    - >
      (requested_privx_is_exact and installed_privx_evr != privx_version) or
      ((not requested_privx_is_exact) and installed_privx_version != privx_version)
  run_once: true

- name: Fail if version mismatch with existing extenders
  ansible.builtin.fail:
    msg:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "                           VERSION MISMATCH ERROR                              "
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "❌ Version mismatch with existing extenders!"
      - ""
      - "• Installed Extender Version: {{ installed_extender_evr }}"
      - "• Requested Version: {{ privx_version }}"
      - ""
      - "When adding extenders to an existing deployment, all extenders must use"
      - "the same version. Please use:"
      - ""
      - "ansible-playbook -i inventory deploy_extender.yml -e privx_version={{ installed_extender_version }}"
      - ""
      - "════════════════════════════════════════════════════════════════════════════════"
  when:
    - existing_extender_check.rc == 0
    - privx_version is defined
    - >
      (requested_privx_is_exact and installed_extender_evr != privx_version) or
      ((not requested_privx_is_exact) and installed_extender_version != privx_version)
  run_once: true

- name: Display extender version consistency success
  ansible.builtin.debug:
    msg: "✓ Extender version consistency check passed - proceeding with installation"
  when:
    - primary_privx_version.rc == 0
    - (not privx_version is defined) or
      (requested_privx_is_exact and installed_privx_evr == privx_version) or
      ((not requested_privx_is_exact) and installed_privx_version == privx_version) or
      (existing_extender_check.rc != 0)
  run_once: true
