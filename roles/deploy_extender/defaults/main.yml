---
# PrivX Extender Installation Role - Default Variables

# FIPS mode setting (only applicable to Red Hat/Rocky Linux 9)
# Set to true to install PrivX-Extender-FIPS instead of PrivX-Extender
extender_fips_enabled: false

# Extender version settings
# If privx_version is defined, install specific version (e.g., "42.2")
# If not defined, install latest available version
extender_base_package_name: "{{ 'PrivX-Extender-' + privx_version if privx_version is defined else 'PrivX-Extender' }}"
extender_fips_package_name: "{{ 'PrivX-Extender-FIPS-' + privx_version if privx_version is defined else 'PrivX-Extender-FIPS' }}"

# Ansible connection settings
REMOTE_USER: "{{ REMOTE_USER | default('rocky') }}"
BECOME: "{{ BECOME | default('no') }}"
