---
# Install PrivX Carrier package and prerequisites

- name: Add Docker CE repository for RHEL/Rocky Linux
  ansible.builtin.command:
    cmd: yum config-manager --add-repo=https://download.docker.com/linux/centos/docker-ce.repo
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when:
    - ansible_facts['distribution'] in ['RedHat', 'Rocky']
    - manage_docker_ce_repo | bool

- name: Install Docker CE (RHEL/Rocky Linux)
  ansible.builtin.dnf:
    name: docker-ce
    state: present
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when: ansible_facts['distribution'] in ['RedHat', 'Rocky']

- name: Start and enable Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Install PrivX Carrier package (dnf)
  ansible.builtin.dnf:
    name: "{{ carrier_package_name }}"
    state: present
  register: carrier_install_result
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when:
    - ansible_facts['distribution'] in ['RedHat', 'Rocky']

- name: Display Carrier installation result
  ansible.builtin.debug:
    msg: "✓ PrivX Carrier installed on {{ inventory_hostname }}"
  when: carrier_install_result.changed

- name: Verify PrivX Carrier installation
  ansible.builtin.command:
    cmd: rpm -q PrivX-Carrier
  register: carrier_verify
  changed_when: false
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Display installed PrivX Carrier version
  ansible.builtin.debug:
    msg: "✓ PrivX Carrier verified: {{ carrier_verify.stdout }}"
