---
# Install PrivX Web Proxy package and prerequisites

# Install EPEL repository for RHEL/Rocky Linux 9
- name: Install EPEL repository for RHEL/Rocky 9
  ansible.builtin.dnf:
    name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
    state: present
    disable_gpg_check: true
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when:
    - ansible_facts['distribution'] in ['RedHat', 'Rocky']
    - ansible_facts['distribution_major_version'] == '9'
    - manage_epel_repo | bool

# Install EPEL repository for RHEL/Rocky Linux 8
- name: Install EPEL repository for RHEL/Rocky 8
  ansible.builtin.dnf:
    name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm
    state: present
    disable_gpg_check: true
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when:
    - ansible_facts['distribution'] in ['RedHat', 'Rocky']
    - ansible_facts['distribution_major_version'] == '8'
    - manage_epel_repo | bool

- name: Install firewalld (dnf)
  ansible.builtin.dnf:
    name: firewalld
    state: present
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when: ansible_facts['distribution'] in ['RedHat', 'Rocky']

- name: Start and enable firewalld service
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Configure firewall ports for Web Proxy
  ansible.builtin.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "18080/tcp"
    - "18443/tcp"
    - "18444/tcp"
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Install PrivX Web Proxy package (dnf)
  ansible.builtin.dnf:
    name: "{{ webproxy_package_name }}"
    state: present
  register: webproxy_install_result
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when:
    - ansible_facts['distribution'] in ['RedHat', 'Rocky']

- name: Install dnf versionlock plugin for PrivX Web Proxy
  ansible.builtin.dnf:
    name: "{{ wag_versionlock_plugin_package }}"
    state: present
  register: webproxy_versionlock_plugin_install
  failed_when: false
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when: ansible_facts['pkg_mgr'] == 'dnf'

- name: Pin installed PrivX Web Proxy package version
  ansible.builtin.command:
    cmd: dnf versionlock add {{ webproxy_package_name }}
  register: webproxy_versionlock_add
  changed_when: "'Adding versionlock on:' in webproxy_versionlock_add.stdout"
  failed_when: false
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when: ansible_facts['pkg_mgr'] == 'dnf'
    and webproxy_versionlock_plugin_install.rc == 0

- name: Display Web Proxy installation result
  ansible.builtin.debug:
    msg: "✓ PrivX Web Proxy installed on {{ inventory_hostname }}"
  when: webproxy_install_result.changed

- name: Display PrivX Web Proxy version lock status
  ansible.builtin.debug:
    msg: >-
      {{ 'PrivX Web Proxy version locked'
         if (webproxy_versionlock_add is defined and webproxy_versionlock_add.rc == 0)
         else 'PrivX Web Proxy version lock skipped or failed but installation continues' }}
      on {{ inventory_hostname }}: {{ webproxy_package_name }}
  when: ansible_facts['pkg_mgr'] == 'dnf'

- name: Verify PrivX Web Proxy installation
  ansible.builtin.command:
    cmd: rpm -q PrivX-Web-Proxy
  register: webproxy_verify
  changed_when: false
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Display installed PrivX Web Proxy version
  ansible.builtin.debug:
    msg: "✓ PrivX Web Proxy verified: {{ webproxy_verify.stdout }}"
