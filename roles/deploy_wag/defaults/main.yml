---
# PrivX Web Access Gateway (WAG) Installation Role - Default Variables

# WAG version settings
# If privx_version is defined, install specific version (e.g., "42.2" or exact package version "42.2-57")
# If not defined, install latest available version
carrier_package_name: "{{ 'PrivX-Carrier-' + privx_version if privx_version is defined else 'PrivX-Carrier' }}"
webproxy_package_name: "{{ 'PrivX-Web-Proxy-' + privx_version if privx_version is defined else 'PrivX-Web-Proxy' }}"
wag_versionlock_plugin_package: python3-dnf-plugin-versionlock

# SSH.COM product repository settings
# These can be overridden via inventory or -e.
manage_ssh_product_repo: true
custom_ssh_product_repo_url: ""
custom_ssh_product_repo_file: ""
ssh_product_repo_gpg_key_url: "https://product-repository.ssh.com/info.fi-ssh.com-pubkey.asc"

# Additional repository management settings
manage_epel_repo: true
manage_docker_ce_repo: true

# Ansible connection settings
ansible_user: "{{ ansible_user | default('rocky') }}"
