---
# Find backup archive and set path for restoration

- name: Find backup archive file
  ansible.builtin.find:
    paths: "./backups"
    patterns: "{{ groups['privx_primary'][0] }}-*.tar.gz"
  register: backup_files
  delegate_to: localhost
  become: false
  run_once: true

- name: Set backup archive path
  ansible.builtin.set_fact:
    backup_archive_path: "{{ backup_files.files[0].path }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ ansible_play_hosts }}"
  run_once: true
  when: backup_files.files | length > 0

- name: Display configuration start information
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "                  CONFIGURING ADDITIONAL NODES                                  "
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "• Primary Node: {{ groups['privx_primary'][0] }}"
      - "• Backup Archive: {{ backup_archive_path | default('Not found') }}"
      - "• Additional Nodes: {{ ansible_play_hosts | join(', ') }}"
      - ""
      - "════════════════════════════════════════════════════════════════════════════════"
  run_once: true
