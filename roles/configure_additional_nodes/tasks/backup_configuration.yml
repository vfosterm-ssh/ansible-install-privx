---
- name: Run PrivX backup script
  ansible.builtin.command:
    cmd: /opt/privx/scripts/backup.sh
  register: backup_result
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Display backup script output
  ansible.builtin.debug:
    var: backup_result.stdout_lines
    verbosity: 0
  when:
    - show_script_output | default(false)
    - backup_result.stdout_lines is defined

- name: Extract backup directory path from script output
  ansible.builtin.set_fact:
    backup_directory_path: "{{ backup_result.stdout_lines | select('match', '.*Backup done, see (/var/backups/privx/.+)/backup.log.*') | first | regex_replace('.*Backup done, see (/var/backups/privx/.+)/backup.log.*', '\\1') }}"
  when: backup_result.stdout_lines is defined

- name: Display extracted backup directory
  ansible.builtin.debug:
    msg: "Backup directory extracted: {{ backup_directory_path }}"
  when: backup_directory_path is defined

- name: Verify backup directory exists
  ansible.builtin.stat:
    path: "{{ backup_directory_path }}"
  register: backup_dir_stat
  remote_user: "{{ ansible_user | default('root') }}"
  become: true
  when: backup_directory_path is defined

- name: Verify backup directory and log file
  ansible.builtin.assert:
    that:
      - backup_directory_path is defined
      - backup_dir_stat.stat.exists
      - backup_dir_stat.stat.isdir
    fail_msg: |
      Backup directory not found or invalid: {{ backup_directory_path | default('undefined') }}
      Please check if the backup script executed successfully.
    success_msg: "Backup directory verified: {{ backup_directory_path }}"

- name: Get backup directory name
  ansible.builtin.set_fact:
    backup_dir_name: "{{ backup_directory_path | basename }}"

- name: Set backup archive destination path
  ansible.builtin.set_fact:
    backup_archive_path_remote: "/var/backups/privx/{{ backup_dir_name }}.tar.gz"

- name: Create compressed backup archive
  ansible.builtin.command:
    cmd: tar -czf {{ backup_archive_path_remote }} -C {{ backup_directory_path | dirname }} {{ backup_dir_name }}
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Set backup archive permissions
  ansible.builtin.file:
    path: "{{ backup_archive_path_remote }}"
    mode: '0644'
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Read backup archive metadata
  ansible.builtin.stat:
    path: "{{ backup_archive_path_remote }}"
  register: backup_archive_stat
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Display backup archive information
  ansible.builtin.debug:
    msg: "Backup archive created: {{ backup_archive_path_remote }} ({{ backup_archive_stat.stat.size | default('Unknown') }} bytes)"

- name: Ensure local backups directory exists
  ansible.builtin.file:
    path: "./backups"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false

- name: Find stale local backup archives for this primary node
  ansible.builtin.find:
    paths: "./backups"
    patterns: "{{ inventory_hostname }}-*.tar.gz"
    file_type: file
  register: stale_local_backups
  delegate_to: localhost
  become: false

- name: Remove stale local backup archives for this primary node
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ stale_local_backups.files }}"
  when: stale_local_backups.matched | default(0) | int > 0
  delegate_to: localhost
  become: false

- name: Fetch backup archive to local machine
  ansible.builtin.fetch:
    src: "{{ backup_archive_path_remote }}"
    dest: "./backups/{{ inventory_hostname }}-{{ backup_dir_name }}.tar.gz"
    flat: true
  remote_user: "{{ ansible_user | default('root') }}"
  become: true

- name: Create local backups directory info
  ansible.builtin.debug:
    msg: "Backup fetched to local path: ./backups/{{ inventory_hostname }}-{{ backup_dir_name }}.tar.gz"
  delegate_to: localhost
