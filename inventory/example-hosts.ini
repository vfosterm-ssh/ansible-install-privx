# PrivX Installation Inventory
# Configure your PrivX nodes below

# Primary PrivX node - installed first for validation
[privx_primary]
#privx-node1.example.com

# Additional PrivX nodes - installed after primary validation
[privx_additional_nodes]
#privx-node2.example.com
#privx-node3.example.com
#privx-node4.example.com

# Future expansion - PrivX Extender nodes
[privxextender]
# Add your PrivX Extender nodes here
# extender-node1.example.com
# extender-node2.example.com

# IMPORTANT: Before running extender installation, you must:
# 1. Access PrivX web interface
# 2. Go to Administration -> Deployment -> Deploy PrivX VPC/VPN Extenders
# 3. Download extender configuration files
# 4. Save them as: ./configuration_files/<hostname>-extender-config.toml

# PrivX Web Access Gateway (WAG) - Carrier nodes
[privxcarrier]
# Add your PrivX Carrier nodes here
# CRITICAL: List nodes in pairing sequence
# carrier-node1.example.com
# carrier-node2.example.com

# PrivX Web Access Gateway (WAG) - Web Proxy nodes
[privxwebproxy]
# Add your PrivX Web Proxy nodes here
# CRITICAL: Must match Carrier node order
# webproxy-node1.example.com  # Pairs with carrier-node1
# webproxy-node2.example.com  # Pairs with carrier-node2

# IMPORTANT: Before running WAG installation, you must:
# 1. Access PrivX web interface
# 2. Go to Settings -> Deployment -> Deploy PrivX web-access gateways
# 3. Create or download web-access-gateway configurations
# 4. Download Carrier Config and save as: ./configuration_files/<hostname>-carrier-config.toml
# 5. Download Proxy Config and save as: ./configuration_files/<hostname>-web-proxy-config.toml
#
# WAG PAIRING REQUIREMENTS:
# - Carrier and Web Proxy nodes work as pairs
# - List nodes in the same order in both groups
# - First Carrier pairs with first Web Proxy, second with second, etc.
# - Each pair should use the same web-access-gateway configuration from PrivX UI

[all:vars]
# PrivX Configuration Variables (configure_privx.yml)
# Required variables (must be provided via command line or inventory):
# privx_dns_name=privx.example.com
# database_password=your_secure_password
# postgres_address=db.example.com

# Optional configuration variables with defaults:
# PrivX ips must be set to a space or IPs in comma separated format 
#privx_ips="<ip1>,<ip2>"
privx_superuser=admin
email_domain=example.com
database_name=privx
database_username=privx
database_port=5432

# Database-connection SSL mode: disable, require, verify-ca, verify-full
# verify-full is recommended for production use
database_sslmode=require

# PostgreSQL server certificate or CA certificate in PEM format when
# database_sslmode is verify-ca or verify-full
postgres_ssl_cert_file=./privx-db-trust-anchor.pem

# PrivX Extender configuration variables:
# Set to true to enable FIPS mode on Red Hat/Rocky Linux 9 extenders
extender_fips_enabled=false

# Repository management:
# Set to false if repositories are managed outside these playbooks
manage_ssh_product_repo=true
manage_epel_repo=true
manage_docker_ce_repo=true
manage_postgresql_module=true

# Custom SSH product repository configuration:
# Define only one of these values at a time
custom_ssh_product_repo_url=
custom_ssh_product_repo_file=

# GPG key URL used when manage_ssh_product_repo=true
ssh_product_repo_gpg_key_url=https://product-repository.ssh.com/info.fi-ssh.com-pubkey.asc

# Ansible connection settings
# SSH user for remote connections
ansible_user=rocky
ansible_ssh_extra_args='-o StrictHostKeyChecking=no'
